name: Linux Build
on: [push,pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
          - compiler: clang
            cc: clang
            cxx: clang++
    steps:
    - uses: actions/checkout@v4
    - name: Установка зависимостей
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake gcc g++ clang
    - name: Конфигурация
      env:
        CC: ${{matrix.cc}}
        CXX: ${{matrix.cxx}}
      run: cmake -B build
    - name: Сборка
      run: cmake --build build



