name: Linux Build
on: 
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag'
        default: 'v1.0.0'
        type: string
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Установка зависимостей
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake gcc g++ clang

    - name: Конфигурация
      run: cmake -B build

    - name: Сборка
      run: cmake --build build

    - name: Создание архивов
      run: |
        mkdir scripts
        cp -r formatter_lib scripts; rm scripts/formatter_lib/CMakeLists.txt
        cp -r formatter_ex_lib scripts; rm scripts/formatter_ex_lib/CMakeLists.txt
        cp -r solver_lib scripts; rm scripts/solver_lib/CMakeLists.txt
        cp -r solver_application scripts; rm scripts/solver_application/CMakeLists.txt
        cd scripts
        cpack -G TGZ
        cpack -G ZIP

    - name: Загрузка артефактов
      uses: actions/upload-artifact@v4
      with:
        name: scripts
        path: |
          scripts/*.tar.gz
          scripts/*.zip


